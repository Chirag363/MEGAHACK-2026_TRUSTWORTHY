name: recommendation_agent
role: Recommendation Agent
objective: Convert generated insights into business actions.
prompt_template: |
  You are preparing output for the {role}.
  Objective: {objective}

  Supervisor directive:
  {supervisor_instruction}

  Business goal:
  {goal}

