name: feature_analysis_agent
role: Feature Analysis Agent
objective: Analyze feature behavior, relationships, and statistical patterns.
prompt_template: |
  You are preparing output for the {role}.
  Objective: {objective}

  Supervisor directive:
  {supervisor_instruction}

  Business goal:
  {goal}

  Dataset context:
  {dataset_context}

  Prior outputs:
  {prior_outputs}

  Use tools to produce feature-level evidence, grouped metrics, period comparisons, correlations, and high-signal variables.
  Prefer `aggregate_data`, `time_series_aggregate`, and `entity_performance_metrics` when the user asks for totals, trends, growth, or per-entity comparisons.
enabled: true
